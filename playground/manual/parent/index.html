<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iframe Helper SDK Manual Parent</title>
    <style>
      :root {
        color: #172033;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
        background: #f4f7fb;
      }

      body {
        margin: 0;
      }

      main {
        display: grid;
        grid-template-columns: minmax(280px, 420px) 1fr;
        gap: 24px;
        min-height: 100vh;
        padding: 24px;
        box-sizing: border-box;
      }

      section {
        background: #ffffff;
        border: 1px solid #d8e0ec;
        border-radius: 16px;
        box-shadow: 0 16px 40px rgb(23 32 51 / 8%);
        padding: 20px;
      }

      h1,
      h2 {
        margin: 0 0 12px;
      }

      p {
        line-height: 1.5;
      }

      button {
        display: block;
        width: 100%;
        margin: 8px 0;
        border: 0;
        border-radius: 10px;
        background: #2563eb;
        color: white;
        cursor: pointer;
        font: inherit;
        padding: 10px 12px;
      }

      button:disabled {
        background: #94a3b8;
        cursor: not-allowed;
      }

      iframe {
        width: 100%;
        min-height: 320px;
        border: 1px solid #cbd5e1;
        border-radius: 14px;
      }

      pre {
        max-height: 320px;
        overflow: auto;
        border-radius: 12px;
        background: #0f172a;
        color: #dbeafe;
        padding: 14px;
        white-space: pre-wrap;
      }

      @media (max-width: 820px) {
        main {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>Manual Parent</h1>
        <p>
          This page imports the package build, mounts the iframe app from a different localhost
          port, communicates through the parent SDK, and lets the iframe resize itself.
        </p>
        <p>Status: <strong id="status">mounting</strong></p>
        <button id="event-button" disabled>Send analytics event</button>
        <button id="request-button" disabled>Request user</button>
        <button id="remount-button">Explicit remount</button>
        <h2>Log</h2>
        <pre id="log"></pre>
      </section>
      <section>
        <h2>Iframe</h2>
        <div id="frame-root"></div>
      </section>
    </main>

    <script type="module">
      import {
        createDiagnosticRecorder,
        createIframeBridge,
        IframeBridgeError,
      } from 'iframe-helper-sdk';
      import { resizePlugin } from 'iframe-helper-sdk/resize';

      const iframeUrl = 'http://127.0.0.1:5174/';
      const logElement = document.querySelector('#log');
      const statusElement = document.querySelector('#status');
      const eventButton = document.querySelector('#event-button');
      const requestButton = document.querySelector('#request-button');
      const remountButton = document.querySelector('#remount-button');
      const recorder = createDiagnosticRecorder({ maxEntries: 100 });

      let bridge = createBridge();
      let unsubscribeCart = attachBridge(bridge);

      eventButton.addEventListener('click', async () => {
        try {
          await bridge.sendEvent(
            'analytics:track',
            { action: 'manual-click', at: new Date().toISOString() },
            { timeoutMs: 3000 },
          );
          log('Parent sent analytics:track');
        } catch (error) {
          logError(error);
        }
      });

      requestButton.addEventListener('click', async () => {
        const controller = new AbortController();

        try {
          const user = await bridge.request(
            'user:get',
            { id: 'manual-user' },
            { signal: controller.signal, timeoutMs: 3000 },
          );
          log(`Parent received user:get response ${JSON.stringify(user)}`);
        } catch (error) {
          logError(error);
        }
      });

      remountButton.addEventListener('click', () => {
        eventButton.disabled = true;
        requestButton.disabled = true;
        statusElement.textContent = 'remounting';
        unsubscribeCart?.();
        bridge = bridge.remount();
        unsubscribeCart = attachBridge(bridge);
        log('Parent explicitly remounted the iframe bridge');
      });

      function createBridge() {
        return createIframeBridge(
          {
            allowInsecureLocalhost: true,
            bootstrap: {
              handshakeTimeoutMs: 5000,
            },
            container: '#frame-root',
            diagnostics: {
              debug: true,
              logger: recorder.logger,
            },
            iframeAttributes: {
              title: 'Manual iframe bridge app',
            },
            replaceContainerContent: true,
            src: iframeUrl,
            timeouts: {
              operationTimeoutMs: 3000,
            },
          },
          {
            plugins: [
              resizePlugin({
                maxHeightPx: 900,
                maxWidthPx: 1200,
                minHeightPx: 320,
                minWidthPx: 320,
              }),
            ],
          },
        );
      }

      function attachBridge(nextBridge) {
        const unsubscribe = nextBridge.on('cart:changed', (payload) => {
          log(`Parent received cart:changed ${JSON.stringify(payload)}`);
        });

        nextBridge.whenReady().then(
          () => {
            statusElement.textContent = 'ready';
            eventButton.disabled = false;
            requestButton.disabled = false;
            log('Bridge ready');
            log(`Diagnostics ${JSON.stringify(recorder.entries, null, 2)}`);
          },
          (error) => {
            statusElement.textContent = 'failed';
            logError(error);
          },
        );

        return unsubscribe;
      }

      function log(message) {
        logElement.textContent += `${new Date().toLocaleTimeString()} ${message}\n`;
      }

      function logError(error) {
        if (error instanceof IframeBridgeError) {
          log(`SDK error ${error.code} ${JSON.stringify(error.details)}`);
          return;
        }

        log(`Unknown error ${String(error)}`);
      }
    </script>
  </body>
</html>
